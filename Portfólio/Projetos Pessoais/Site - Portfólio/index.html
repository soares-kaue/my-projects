<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Kaue Soares|Portfólio</title>
</head>

<body>
    <div class="particulas"></div>


    <nav class="navegacao">
        <ul class="menu">
            <li>
                <a href="#inicio" class="menu-link">Inicio</a>
            </li>
            <li>
                <a href="#sobre" class="menu-link">Sobre</a>
            </li>
            <li>
                <a href="#projetos" class="menu-link">Projetos</a>
            </li>
            <li>
                <a href="#contato" class="menu-link">Contato</a>
            </li>
        </ul>
    </nav>

    <main id="inicio" class="cabecalho">
        <img src="./img/icon1.png" alt="Foto de Kaue Soares" class="foto-perfil">
        <h1>Seu Nome</h1>
        <p class="cabecalho-sub-titulo">Cargo / Função</p>
    </main>

    <section id="sobre" class="sobre">
        <h2 class="sobre-titulo">Sobre Mim</h2>
        <div class="sobre-caixa">
            <p class="sobre-paragrafo">
                &nbsp
            </p>
        </div>
    </section>

    <section id="projetos" class="projetos">
        <h2 class="projetos-titulo">Meus Projetos</h2>
        <div class="projetos-caixa">

            <div class="projetos-card">
                <img src="./img/icon2.jpg" alt="Projeto 1" class="projetos-imagem">
                <div class="caixa-textos-projetos">
                    <h3 class="info-projetos">Projeto 1</h3>
                    <p class="paragrafo-projetos">
                        &nbsp</p>
                </div>
            </div>

            <div class="projetos-card">
                <img src="./img/icon2.jpg" alt="Projeto 1" class="projetos-imagem">
                <div class="caixa-textos-projetos">
                    <h3 class="info-projetos">Projeto 2</h3>
                    <p class="paragrafo-projetos">
                        &nbsp</p>
                </div>
            </div>

            <div class="projetos-card">
                <img src="./img/icon2.jpg" alt="Projeto 1" class="projetos-imagem">
                <div class="caixa-textos-projetos">
                    <h3 class="info-projetos">Projeto 3</h3>
                    <p class="paragrafo-projetos">
                        &nbsp</p>
                </div>
            </div>

        </div>
    </section>

    <section id="contato" class="contatos">
        <h2 class="contatos-titulo">Entre em Contato</h2>
        <form class="formulario-contato" id="formulario" onsubmit="enviarWhatsapp(event)">
            <div class="grupo-form">
                <input placeholder="Nome" class="campo-form" id="nome">
            </div>
            <div class="grupo-form">
                <textarea class="campo-form" placeholder="Digite sua Mensagem" rows="5" id="mensagem"></textarea>
            </div>

            <button type="submit" class="botao-form">Enviar</button>
        </form>
    </section>

    </script>
    <script>

        function enviarWhatsapp(event) {
            event.preventDefault();

            const nome = document.getElementById(`nome`).value;
            const mensagem = document.getElementById(`mensagem`).value;
            const telefone = "5516982338837";

            const texto = `Olá, meu nome é ${nome}, e gostaria de entrar em contato com você. Minha mensagem é: ${mensagem}`;
            const msgFormatada = encodeURIComponent(texto);

            const url = `https://wa.me/${telefone}?text=${msgFormatada}`;

            window.open(url, '_blank');
        }


    </script>

</body>

</html>
