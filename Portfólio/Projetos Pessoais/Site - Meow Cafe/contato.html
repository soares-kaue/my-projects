<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Meow Café | Contato</title>
</head>

<body>
    
    <button class="botao-voltar"><a href="index.html">Voltar</a></button>
    
    <section class="contato" id="contato">
        <h4 class="contato-titulo">Entre em Contato</h4>
        <form class="formulario-contato" id="formulario" onsubmit="enviarMensagem(event)">
            <div class="box-formulario">
                <input placeholder="Nome" class="campo-formulario" id="nome">
            </div>
            <div class="box-formulario">
                <textarea class="campo-formulario" placeholder="Mensagem" rows="5" id="mensagem"></textarea>
            </div>
            <button type="submit" class="botao-enviar">Enviar</button>
        </form>
    </section>

    <script>

        function enviarMensagem(event) {
            event.preventDefault();

            const nome = document.getElementById('nome').value;
            const mensagem = document.getElementById('mensagem').value;
            const telefone = "55 12345-6789"; // Substitua pelo número de telefone real

            const texto = `Olá, meu nome é ${nome} e minha mensagem é: ${mensagem}`;
            const msgFormatada = encodeURIComponent(texto);

            const url = `https://wa.me/${telefone}?text=${msgFormatada}`;

            window.open(url, '_blank');
        }
    </script>

</body>

</html>
